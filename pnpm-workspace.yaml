packages:
  - .

overrides:
  # Security overrides — bump vulnerable transitive deps to their patched
  # release without forcing risky major upgrades (ranges are lower-bounded so
  # unrelated version lines are untouched). See CLAUDE.md hardening notes.
  'i18next-fs-backend@<2.6.6': '^2.6.6'
  'form-data@<4.0.6': '^4.0.6'
  'fast-xml-parser@<5.3.5': '^5.3.5'
  'glob@>=10.2.0 <10.5.0': '^10.5.0'
  'tmp@<0.2.4': '^0.2.4'
  'js-yaml@<4.1.2': '^4.1.2'
  'ws@>=8.0.0 <8.21.0': '^8.21.0'
  'undici@>=7.0.0 <7.28.0': '^7.28.0'
  '@grpc/grpc-js@>=1.14.0 <1.14.4': '^1.14.4'
  'protobufjs@<7.6.3': '^7.6.3'
  'tar@<7.5.16': '^7.5.16'
  'postcss@<8.5.10': '^8.5.10'
  'vite@>=7.0.0 <7.3.5': '^7.3.6'
  'minimatch@>=3.0.0 <3.1.4': '^3.1.4'
  'minimatch@>=9.0.0 <9.0.7': '^9.0.7'
  '@eslint/plugin-kit@<0.3.4': '^0.3.4'

allowBuilds:
  '@tailwindcss/oxide': true
  core-js: false
  cpu-features: false
  esbuild: false
  osx-temperature-sensor: true
  protobufjs: false
  sharp: true
  ssh2: false

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - osx-temperature-sensor
  - protobufjs
  - sharp
